# See https://pre-commit.com — run `pre-commit install` once per clone.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pytest>=7.0
          - requests>=2.31.0
          - types-requests
          - PyYAML>=6.0.1
          - types-PyYAML
          - types-tabulate
          - prettytable>=3.9.0
          - tabulate>=0.9.0
          - python-dotenv>=1.0.0
        args: [--config-file=pyproject.toml]
        pass_filenames: false
