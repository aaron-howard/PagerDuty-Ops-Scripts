name: PagerDuty Scripts Demo

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  demo:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Demo - Export IDs (Mock)
      run: |
        echo "=== PagerDuty Scripts Demo ==="
        echo "This demo shows the structure and capabilities of the PagerDuty operations scripts."
        echo ""
        echo "Available scripts (high level):"
        echo "• pd_export_ids.py - Export teams, schedules, services, and webhooks (relational)"
        echo "• pd_rename_resources.py - Bulk prefix/suffix renames for services, schedules, escalation policies"
        echo "• pd_list_users.py / pd_list_teams.py - Flat directory exports (table/csv/json)"
        echo "• pd_list_incidents.py - Incident exports (filters, csv/json)"
        echo "• pd_event_orchestration_rules.py / pd_apply_event_orchestration_rules.py - EO export + guarded apply"
        echo "• pd_alert_grouping.py - Alert grouping list, JSON CRUD, CSV attach"
        echo "• pd_get_teams_user_role.py - List team members and roles (deprecated for MCP reads)"
        echo "• pd_update_team_roles.py - Interactive role management"
        echo "• pd_remove_team_members.py - Remove team members"
        echo "• update_service_notifications.py - Update notification settings"
        echo ""
        echo "To use these scripts in production:"
        echo "1. Set PD_API_TOKEN environment variable"
        echo "2. Set PD_TEAM_ID for team-specific operations"
        echo "3. Run scripts with appropriate parameters"
        echo ""
        echo "Example usage:"
        echo "python pd_export_ids.py --format table"
        echo "python pd_rename_resources.py --resource services --suffix ' SVC' --dry-run --list"
    
    - name: Test Script Syntax
      run: |
        echo "Testing script syntax for all Python files..."
        shopt -s nullglob
        for f in *.py; do
          echo "  py_compile $f"
          python -m py_compile "$f"
        done
        echo "✅ All scripts have valid syntax"
    
    - name: Run Demo with Sample Data
      run: |
        echo "Running demo with sample data..."
        python demo_sample_output.py
